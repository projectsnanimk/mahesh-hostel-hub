<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MAHESH HOSTELS STUDENT PORTAL - HostelHub</title>
  <link rel="stylesheet" href="/css/styles.css">
  <script src="/js/db-helper.js"></script>
</head>
<body>
  <div class="login-container">
    <div class="student-login-card">
      <h2 class="login-title" style="font-size: 1.5rem; text-align: center; margin-top: 10px;">MAHESH HOSTELS STUDENT PORTAL</h2>
      <p class="login-subtitle">Please authenticate using your system-generated ID and default password.</p>
      
      <form id="studentLoginForm">
        <div class="form-group">
          <label class="form-label" for="studentId">Student User ID</label>
          <input class="form-input" type="text" id="studentId" placeholder="e.g., M1120726001" required autocomplete="username">
        </div>
        
        <div class="form-group">
          <label class="form-label" for="password">Security Password</label>
          <input class="form-input" type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
        </div>
        
        <button class="btn-submit" type="submit">Verify Credentials</button>
      </form>
      

    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script>
    // Toast Alert Helper
    function showToast(message, type = 'success') {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.innerHTML = `
        <span>${message}</span>
        <span style="cursor:pointer;" onclick="this.parentElement.remove()">×</span>
      `;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 4000);
    }

    document.getElementById('studentLoginForm').addEventListener('submit', (e) => {
      e.preventDefault();
      
      const student_id = document.getElementById('studentId').value.trim();
      const password = document.getElementById('password').value;

      try {
        const student = HostelHubDB.authenticateStudent(student_id, password);

        if (student) {
          showToast('Student Authenticated Successfully', 'success');
          // Cache mock token and user type
          localStorage.setItem('hostelhub_token', student.student_id);
          localStorage.setItem('hostelhub_user_type', 'STUDENT');
          setTimeout(() => {
            window.location.href = '/dashboards/student.html';
          }, 800);
        } else {
          showToast('Authentication Failed: Invalid Student ID or Password', 'error');
        }
      } catch (err) {
        showToast('Local database processing error.', 'error');
        console.error(err);
      }
    });
  </script>
</body>
</html>
