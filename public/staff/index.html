<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff Terminal - HostelHub</title>
  <link rel="stylesheet" href="/css/styles.css">
  <script src="/js/db-helper.js"></script>
</head>
<body class="dark-theme">
  <div class="login-container">
    <div class="staff-login-terminal">
      <div class="login-logo">🛠️ HostelHub Terminal</div>
      <h2 class="login-title">Staff Authentication Console</h2>
      <p class="login-subtitle">System credentials required. Admins use corporate Mail ID. Wardens, Watchmen & Accountants must log in using unique Staff IDs.</p>
      
      <form id="staffLoginForm">
        <div class="form-group">
          <label class="form-label" for="identifier">System Identifier / ID</label>
          <input class="form-input" type="text" id="identifier" placeholder="Corporate Mail / Staff ID (e.g. M1WDN001)" required autocomplete="username">
        </div>
        
        <div class="form-group">
          <label class="form-label" for="password">Security Password</label>
          <input class="form-input" type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
        </div>
        
        <button class="btn-submit" type="submit">Execute Handshake</button>
      </form>
      
      <div class="login-footer">
        Are you a student? <a href="/">Enter Student Gateway</a>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script>
    // Toast Alert Helper
    function showToast(message, type = 'success') {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.innerHTML = `
        <span>${message}</span>
        <span style="cursor:pointer;" onclick="this.parentElement.remove()">×</span>
      `;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 4000);
    }

    document.getElementById('staffLoginForm').addEventListener('submit', (e) => {
      e.preventDefault();
      
      const identifier = document.getElementById('identifier').value.trim();
      const password = document.getElementById('password').value;

      try {
        const staff = HostelHubDB.authenticateStaff(identifier, password);

        if (!staff) {
          showToast('Authentication Failed: Invalid Credentials', 'error');
          return;
        }

        let redirectUrl = '';
        
        switch (staff.user_role) {
          case 'ADMIN':
            if (identifier === 'GLADM001') {
              showToast('Admin Authentication Restriction: Global Admin must log in using Corporate Mail ID or Username, not Staff ID.', 'error');
              return;
            }
            redirectUrl = '/dashboards/admin.html';
            break;

          case 'ACCOUNTANT':
            if (identifier !== staff.user_id) {
              showToast('Accountant Authentication Restriction: Central Accountant must log in using their unique Staff ID string.', 'error');
              return;
            }
            redirectUrl = '/dashboards/accountant.html';
            break;

          case 'WARDEN':
            if (identifier !== staff.user_id) {
              showToast('Warden Authentication Restriction: Local Warden must log in using their unique Staff ID string.', 'error');
              return;
            }
            redirectUrl = '/dashboards/warden.html';
            break;

          case 'WATCHMAN':
            if (identifier !== staff.user_id) {
              showToast('Watchman Authentication Restriction: Local Watchman must log in using their unique Staff ID string.', 'error');
              return;
            }
            redirectUrl = '/dashboards/watchman.html';
            break;

          default:
            showToast('Access Denied: Invalid Corporate Personnel Node', 'error');
            return;
        }

        showToast('Staff Authenticated Successfully', 'success');
        
        // Cache token details locally (using JSON string representation of the token metadata)
        const mockTokenData = {
          id: staff.user_id,
          username: staff.username,
          role: staff.user_role,
          assigned_hostel: staff.assigned_hostel
        };
        localStorage.setItem('hostelhub_token', JSON.stringify(mockTokenData));
        localStorage.setItem('hostelhub_user_type', 'STAFF');

        setTimeout(() => {
          window.location.href = redirectUrl;
        }, 800);
      } catch (err) {
        showToast('Local database processing error.', 'error');
        console.error(err);
      }
    });
  </script>
</body>
</html>
