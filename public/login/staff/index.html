<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff Terminal - HostelHub</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="dark-theme">
  <div class="login-container">
    <div class="staff-login-terminal">
      <div class="login-logo">🛠️ HostelHub Terminal</div>
      <h2 class="login-title">Staff Authentication Console</h2>
      <p class="login-subtitle">System credentials required. Admins use corporate Mail ID. Wardens, Watchmen & Accountants must log in using unique Staff IDs.</p>
      
      <form id="staffLoginForm">
        <div class="form-group">
          <label class="form-label" for="identifier">System Identifier / ID</label>
          <input class="form-input" type="text" id="identifier" placeholder="Corporate Mail / Staff ID (e.g. M1WDN001)" required autocomplete="username">
        </div>
        
        <div class="form-group">
          <label class="form-label" for="password">Security Password</label>
          <input class="form-input" type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
        </div>
        
        <button class="btn-submit" type="submit">Execute Handshake</button>
      </form>
      
      <div class="login-footer">
        Are you a student? <a href="/login/student/">Enter Student Gateway</a>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script>
    // Toast Alert Helper
    function showToast(message, type = 'success') {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.innerHTML = `
        <span>${message}</span>
        <span style="cursor:pointer;" onclick="this.parentElement.remove()">×</span>
      `;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 4000);
    }

    document.getElementById('staffLoginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const identifier = document.getElementById('identifier').value.trim();
      const password = document.getElementById('password').value;

      try {
        const response = await fetch('/api/auth/staff/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ identifier, password })
        });

        const result = await response.json();

        if (response.ok && result.status === 'SUCCESS') {
          showToast(result.message, 'success');
          // Cache token and redirect
          localStorage.setItem('hostelhub_token', result.token);
          localStorage.setItem('hostelhub_user_type', 'STAFF');
          setTimeout(() => {
            window.location.href = result.redirect;
          }, 800);
        } else {
          showToast(result.message || 'Authentication handshake rejected.', 'error');
        }
      } catch (err) {
        showToast('Network error connecting to auth server console.', 'error');
        console.error(err);
      }
    });
  </script>
</body>
</html>
